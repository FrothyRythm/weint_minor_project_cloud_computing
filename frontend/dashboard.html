<!-- User dashboard for managing storage quota, uploads, downloads, and sharing -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud Vault - Dashboard</title>
  <link rel="stylesheet" href="public/css/styles.css">
</head>
<body>
  <div class="dashboard-container">
    <div class="header">
      <div>
        <h2>Storage Space</h2>
        <p class="quota-indicator" id="quota-text">Usage: Calculating...</p>
      </div>
      <button id="logout-btn" class="btn-secondary" style="width: auto;">Logout</button>
    </div>

    <div class="upload-section" id="drop-zone">
      <h3>Drag & Drop Files Here</h3>
      <p>Or click to select files from your computer</p>
      <input type="file" id="file-input" style="display: none;">
      <div class="progress-bar-container" id="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
    </div>

    <div id="dashboard-alert" class="alert"></div>

    <h3 style="margin-top: 2rem;">Your Files</h3>
    <div class="file-grid" id="file-list">
      <!-- File cards will be injected dynamically -->
    </div>
  </div>

  <div class="modal" id="share-modal">
    <div class="modal-content">
      <h3>Share File</h3>
      <div class="form-group">
        <label for="share-expiry">Link Expiry (Minutes)</label>
        <input type="number" id="share-expiry" value="60" min="1" required>
      </div>
      <button id="generate-link-btn">Generate Link</button>
      <div id="share-result" style="margin-top: 1rem; display: none;">
        <input type="text" id="share-url" readonly style="margin-bottom: 0.5rem;">
        <button id="copy-link-btn" class="btn-success">Copy Link</button>
      </div>
      <button id="close-modal-btn" class="btn-secondary">Close</button>
    </div>
  </div>

  <script src="public/js/api.js"></script>
  <script src="public/js/dashboard.js"></script>
</body>
</html>
