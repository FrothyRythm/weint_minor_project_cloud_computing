<!-- Landing page for CloudVault application with vault logo and animations -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CloudVault - Login & Register</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container">
    <div class="logo-container">
      <svg class="logo-svg" viewBox="0 0 100 100" width="70" height="70" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="50" cy="50" r="42" stroke-width="6"/>
        <circle cx="50" cy="50" r="32" stroke-dasharray="6 4" stroke-width="2"/>
        <rect x="14" y="44" width="8" height="12" rx="2" fill="currentColor"/>
        <circle cx="50" cy="50" r="22" stroke-width="3"/>
        <line x1="50" y1="8" x2="50" y2="28" stroke-width="4"/>
        <line x1="50" y1="72" x2="50" y2="92" stroke-width="4"/>
        <line x1="8" y1="50" x2="28" y2="50" stroke-width="4"/>
        <line x1="72" y1="50" x2="92" y2="50" stroke-width="4"/>
        <circle cx="50" cy="44" r="5" fill="currentColor"/>
        <circle cx="44" cy="54" r="5" fill="currentColor"/>
        <circle cx="56" cy="54" r="5" fill="currentColor"/>
      </svg>
      <h1 style="font-size: 2.25rem; font-weight: 700; color: var(--accent-color); margin-bottom: 0;">CloudVault</h1>
    </div>

    <div id="auth-alert" class="alert"></div>

    <div id="login-section">
      <h2 style="font-size: 1.5rem; margin-bottom: 1.25rem; color: #ffffff;">Sign In</h2>
      <form id="login-form">
        <div class="form-group">
          <label for="login-username">Username</label>
          <input type="text" id="login-username" name="username" required>
        </div>
        <div class="form-group" style="margin-top: 1rem;">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" name="password" required>
        </div>
        <button type="submit" style="margin-top: 1.5rem;">Log In</button>
      </form>
    </div>

    <div id="register-section" style="display: none;">
      <h2 style="font-size: 1.5rem; margin-bottom: 1.25rem; color: #ffffff;">Register</h2>
      <form id="register-form">
        <div class="form-group">
          <label for="register-username">Username</label>
          <input type="text" id="register-username" name="username" required>
        </div>
        <div class="form-group" style="margin-top: 1rem;">
          <label for="register-password">Password</label>
          <input type="password" id="register-password" name="password" required>
        </div>
        <button type="submit" style="margin-top: 1.5rem;">Create Account</button>
      </form>
    </div>

    <button id="toggle-auth" class="btn-secondary">Don't have an account? Register</button>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
